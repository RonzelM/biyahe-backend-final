<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Booking</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/stylesheet.css') }}">
</head>

<body>

  <div class="container">

    <!-- TITLE -->
    <h2 id="title"> Welcome to <br>R.A.S.S Car Rental</h2>

    <!-- VEHICLE INFO / QUESTION AREA -->
    <div id="question">Loading booking form...</div>

    <!-- INPUT FIELD (used only if you still need JS step mode) -->
    <input type="text" id="inputField" style="display:none;" />

    <!-- BUTTON (optional fallback) -->
    <button id="nextBtn" onclick="nextStep()" style="display:none;">
      Next
    </button>

    <!-- MESSAGE AREA -->
    <p id="message"></p>

  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
